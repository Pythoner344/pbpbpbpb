<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация в EasyGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #171717; color: #ececec; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md p-8 bg-[#212121] rounded-2xl border border-neutral-800 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">EasyGPT <span class="text-xs bg-emerald-600 px-2 py-0.5 rounded text-white font-normal">5.6</span></h1>
            <p class="text-neutral-400 text-sm">Создано компанией EasyAi</p>
        </div>

        {% if error %}
            <div class="p-3 mb-4 bg-red-950/50 border border-red-800 text-red-200 text-sm rounded-lg text-center">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/auth" id="authForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-neutral-400 uppercase mb-2">Имя пользователя</label>
                <input type="text" name="username" required class="w-full p-3 bg-[#2f2f2f] border border-neutral-700 rounded-xl text-white placeholder-neutral-500 focus:outline-none focus:border-emerald-500 transition" placeholder="Придумайте никнейм">
            </div>

            <div>
                <label class="block text-xs font-semibold text-neutral-400 uppercase mb-2">Надежный пароль</label>
                <input type="password" name="password" required class="w-full p-3 bg-[#2f2f2f] border border-neutral-700 rounded-xl text-white placeholder-neutral-500 focus:outline-none focus:border-emerald-500 transition" placeholder="••••••••">
            </div>

            <div class="p-4 bg-[#171717] rounded-xl border border-neutral-800 space-y-2">
                <label class="block text-xs font-semibold text-emerald-400 uppercase">Обязательная проверка (Анти-Бот)</label>
                <div class="text-lg font-bold text-white mb-1">{{ captcha_question }}</div>
                <input type="number" name="captcha" required class="w-full p-2 bg-[#2f2f2f] border border-neutral-700 rounded-lg text-white focus:outline-none focus:border-emerald-500 text-center text-xl tracking-wider" placeholder="Ваш ответ">
            </div>

            <input type="hidden" name="action" id="formAction" value="login">

            <div class="space-y-3 pt-2">
                <button type="submit" onclick="setAction('login')" class="w-full p-3 bg-emerald-600 hover:bg-emerald-500 font-semibold text-white rounded-xl transition shadow-lg shadow-emerald-950/20">Войти в аккаунт</button>
                <button type="submit" onclick="setAction('register')" class="w-full p-3 bg-neutral-800 hover:bg-neutral-700 font-semibold text-neutral-300 rounded-xl transition">Зарегистрироваться</button>
            </div>
        </form>
    </div>

    <script>
        function setAction(actionType) {
            document.getElementById('formAction').value = actionType;
        }
    </script>
</body>
</html>
